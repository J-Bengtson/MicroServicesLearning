version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_microservices
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - microservices_net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_microservices
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    networks:
      - microservices_net

  gateway-service:
    build:
      context: .
      dockerfile: GatewayService/Dockerfile
    container_name: gateway_service
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ReverseProxy__Clusters__userCluster__Destinations__destination1__Address=http://user-service:8080/
      - ReverseProxy__Clusters__authCluster__Destinations__destination1__Address=http://auth-service:8080/
      - ReverseProxy__Clusters__paymentCluster__Destinations__destination1__Address=http://payment-service:8080/
    depends_on:
      - user-service
      - auth-service
    networks:
      - microservices_net

  user-service:
    build:
      context: .
      dockerfile: UserService/Dockerfile
    container_name: user_service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__UserDatabase=Host=postgres;Database=userdb;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - microservices_net

  auth-service:
    build:
      context: .
      dockerfile: AuthService/Dockerfile
    container_name: auth_service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__AuthDatabase=Host=postgres;Database=authdb;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - microservices_net

  notification-service:
    build:
      context: .
      dockerfile: NotificationService/Dockerfile
    container_name: notification_service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__NotificationDatabase=Host=postgres;Database=notificationdb;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - microservices_net

  payment-service:
    build:
      context: .
      dockerfile: PaymentService/Dockerfile
    container_name: payment_service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__PaymentDatabase=Host=postgres;Database=paymentdb;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - microservices_net

volumes:
  postgres_data:

networks:
  microservices_net:
    driver: bridge
